<?xml version="1.0" encoding="UTF-8"?>
<!--
  Remedia disclaimer overlay
  Vertical 9:16 video, last 1.5s
  1080x1920 px, transparent background
  Export to PNG and drop into CapCut as a final overlay layer
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1612" stop-opacity="0"/>
      <stop offset="40%" stop-color="#1a1612" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#1a1612" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="1280" width="1080" height="640" fill="url(#bgFade)"/>

  <text x="60" y="100"
        fill="#d4a574" font-family="Georgia, 'Times New Roman', serif"
        font-size="34" font-weight="400" letter-spacing="8"
        opacity="0.88">REMEDIA</text>

  <g filter="url(#softShadow)">
    <text x="540" y="1500"
          fill="#f0e9df" font-family="Georgia, 'Times New Roman', serif"
          font-size="44" font-weight="700"
          text-anchor="middle" letter-spacing="2">
      Educational. Not medical advice.
    </text>
    <text x="540" y="1572"
          fill="#a89c8a" font-family="-apple-system, 'Segoe UI', sans-serif"
          font-size="30" font-weight="400"
          text-anchor="middle">
      Always consult a qualified practitioner.
    </text>
    <text x="540" y="1640"
          fill="#a89c8a" font-family="-apple-system, 'Segoe UI', sans-serif"
          font-size="30" font-weight="400"
          text-anchor="middle">
      Especially in pregnancy, on medication,
    </text>
    <text x="540" y="1684"
          fill="#a89c8a" font-family="-apple-system, 'Segoe UI', sans-serif"
          font-size="30" font-weight="400"
          text-anchor="middle">
      or with chronic conditions.
    </text>
  </g>

  <g stroke="#8fbc8f" stroke-width="1.5" opacity="0.6">
    <line x1="380" y1="1740" x2="700" y2="1740"/>
    <circle cx="540" cy="1740" r="4" fill="#8fbc8f" stroke="none"/>
  </g>

  <text x="540" y="1810"
        fill="#d4a574" font-family="-apple-system, 'Segoe UI', sans-serif"
        font-size="32" font-weight="600"
        text-anchor="middle" letter-spacing="3">
    Comment RESET for the free 30-day protocol
  </text>
</svg>
